azure:
  project_endpoint: "${AZURE_AI_PROJECT_ENDPOINT}"
  model_deployment: "${MODEL_DEPLOYMENT}" # options: "gpt-5.1", "gpt-5.4-mini"
  api_key: "${AZURE_OPENAI_API_KEY}"

cosmosdb:
  endpoint: "${COSMOSDB_ENDPOINT}"
  key: "${COSMOSDB_KEY}"
  database: "stock-options-manager"

context:
  max_decision_entries: 2   # Recent decisions to inject as agent context (0=none, max 5). Each includes its signal if actionable.
  decision_ttl_days: 90     # Decisions older than this are auto-expired via CosmosDB TTL

scheduler:
  cron: "0 14-21/2 * * 1-5"  # Cron expression: every 2 hours, market hours (Mon-Fri 14-21 Spain / 9-16 US)

web:
  host: "0.0.0.0"
  port: 8000
