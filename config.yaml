azure:
  project_endpoint: "${AZURE_AI_PROJECT_ENDPOINT}"
  model_deployment: "gpt-5.1" # options: "gpt-5.1", "gpt-5.4-mini"

mcp:
  provider: "tradingview"  # Options: "massive", "alphavantage", "yahoo", or "tradingview"
  massive:
    command: "mcp_massive"
    args: []
    description: "Massive.com financial data API for stocks, options, forex, crypto market data with SQL querying and Black-Scholes Greeks"
    env_key: "MASSIVE_API_KEY"
  alphavantage:
    transport: "streamable_http"
    url: "https://mcp.alphavantage.co/mcp?apikey=${ALPHAVANTAGE_API_KEY}"
    description: "Alpha Vantage remote MCP server for stocks, options, forex, crypto, and technical indicators"
    env_key: "ALPHAVANTAGE_API_KEY"
  yahoo:
    command: "uvx"
    args: ["mcp-yahoo-finance"]
    description: "Yahoo Finance MCP server for free real-time stock prices, options chains, fundamentals, dividends, earnings, and analyst recommendations"
  tradingview:
    command: "podman"
    args: ["run", "-i", "--rm", "--init", "mcr.microsoft.com/playwright/mcp"]
    description: "Playwright MCP server (container) for browser automation — renders TradingView pages with full JavaScript support for technical analysis, forecasts, and options chain data"

context:
  max_decision_entries: 5   # How many recent decisions to inject as agent context
  max_signal_entries: 1    # How many recent signals to inject as agent context

scheduler:
  cron: "0 14-21/2 * * 1-5"  # Cron expression: every 2 hours, market hours (Mon-Fri 14-21 Spain / 9-16 US) 

covered_call:
  symbols_file: "data/covered_call_symbols.txt"
  decision_log: "logs/covered_call_decisions.jsonl"
  signal_log: "logs/covered_call_signals.jsonl"

cash_secured_put:
  symbols_file: "data/cash_secured_put_symbols.txt"
  decision_log: "logs/cash_secured_put_decisions.jsonl"
  signal_log: "logs/cash_secured_put_signals.jsonl"

open_call_monitor:
  positions_file: "data/opened_calls.txt"
  decision_log: "logs/open_call_monitor_decisions.jsonl"
  signal_log: "logs/open_call_monitor_signals.jsonl"

open_put_monitor:
  positions_file: "data/opened_puts.txt"
  decision_log: "logs/open_put_monitor_decisions.jsonl"
  signal_log: "logs/open_put_monitor_signals.jsonl"
