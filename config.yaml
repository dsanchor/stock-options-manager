azure:
  project_endpoint: "${AZURE_AI_PROJECT_ENDPOINT}"
  model_deployment: "gpt-5.4-mini"

mcp:
  provider: "alphavantage"  # Options: "massive" or "alphavantage"
  massive:
    command: "mcp_massive"
    args: []
    description: "Massive.com financial data API for stocks, options, forex, crypto market data with SQL querying and Black-Scholes Greeks"
    env_key: "MASSIVE_API_KEY"
  alphavantage:
    transport: "streamable_http"
    url: "https://mcp.alphavantage.co/mcp?apikey=${ALPHAVANTAGE_API_KEY}"
    description: "Alpha Vantage remote MCP server for stocks, options, forex, crypto, and technical indicators"
    env_key: "ALPHAVANTAGE_API_KEY"

scheduler:
  interval_minutes: 1  # How often to run the agents

covered_call:
  symbols_file: "data/covered_call_symbols.txt"
  decision_log: "logs/covered_call_decisions.log"
  signal_log: "logs/covered_call_signals.log"

cash_secured_put:
  symbols_file: "data/cash_secured_put_symbols.txt"
  decision_log: "logs/cash_secured_put_decisions.log"
  signal_log: "logs/cash_secured_put_signals.log"
